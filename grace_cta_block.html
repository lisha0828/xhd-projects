<title>Grace · 联系区块模板</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@600;700&family=Noto+Serif+SC:wght@400;600;700;900&family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #0d2240; }

.cta-section {
  background: linear-gradient(160deg, #0d2240 0%, #1a4f8b 100%);
  padding: 64px 20px;
  text-align: center;
  position: relative;
  overflow: hidden;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
}
.cta-section::before {
  content: '';
  position: absolute;
  inset: 0;
  background: radial-gradient(ellipse 80% 60% at 50% 50%, rgba(200,150,62,0.1) 0%, transparent 70%);
}
.cta-en {
  font-family: 'Noto Serif SC', serif;
  font-style: italic;
  font-size: 13px;
  color: rgba(200,150,62,0.65);
  letter-spacing: 3px;
  margin-bottom: 12px;
  position: relative;
}
.cta-title {
  font-family: 'Noto Serif SC', serif;
  font-size: clamp(24px, 6vw, 34px);
  color: white;
  font-weight: 700;
  letter-spacing: 3px;
  margin-bottom: 6px;
  position: relative;
}
.cta-sub {
  font-size: 13px;
  color: rgba(255,255,255,0.5);
  letter-spacing: 1.5px;
  margin-bottom: 36px;
  position: relative;
}
.contact-card {
  display: inline-flex;
  flex-direction: column;
  align-items: center;
  border: 1px solid rgba(200,151,62,0.35);
  padding: 24px 28px 20px;
  background: rgba(255,255,255,0.04);
  position: relative;
  min-width: 260px;
  cursor: pointer;
  transition: border-color .25s, box-shadow .25s;
  text-decoration: none;
  color: inherit;
}
.contact-card:hover {
  border-color: rgba(200,151,62,0.8);
  box-shadow: 0 0 20px rgba(200,151,62,0.2);
}
.contact-name {
  font-family: 'Noto Serif SC', serif;
  font-size: 18px;
  font-weight: 700;
  color: #f0d080;
  letter-spacing: 3px;
  margin-bottom: 4px;
}
.contact-phone {
  font-family: 'Cormorant Garamond', 'Georgia', serif;
  font-variant-numeric: lining-nums;
  font-size: 20px;
  font-weight: 700;
  color: white;
  letter-spacing: 1.5px;
}
.contact-role {
  font-size: 10px;
  color: rgba(255,255,255,0.35);
  letter-spacing: 3px;
  margin-top: 4px;
  text-transform: uppercase;
}
</style>
